<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="question"></div>
    <style>
      body {
        display: flex;
        margin: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        font-size: 25vh;
        background: #dcc;
        color: #fee;
        text-shadow: 0 3px 5px #0004;
      }
    </style>
    <script>
      const colors = {
        k: "oklch(40% 15% 80deg)",
        g: "oklch(40% 15% 80deg)",
        s: "oklch(40% 15% 220deg)",
        z: "oklch(40% 15% 220deg)",
        t: "oklch(40% 15% 300deg)",
        d: "oklch(40% 15% 300deg)",
        n: "oklch(40% 15% 160deg)",
        h: "oklch(40% 15% 80deg)",
        b: "oklch(40% 15% 80deg)",
        p: "oklch(40% 15% 80deg)",
        m: "oklch(40% 15% 350deg)",
        y: "oklch(40% 15% 80deg)",
        r: "oklch(40% 15% 30deg)",
        w: "oklch(40% 15% 200deg)",
      };
      const defaultColor = 'oklch(40% 15% 200deg)';

      var input = "";
      var answer = null;
      var mode = "hiragana";
      const questionEl = document.getElementById("question");

      document.addEventListener("keydown", (e) => {
        console.log(e)
        if (e.code == "Space") {
          speak(questionEl.textContent);
          return;
        }
        if (e.key == "Shift") {
          if (mode == "hiragana") {
            mode = "katakana";
          } else if (mode == "katakana") {
            mode = "hiragana";
          }
          update(answer)
        }
        if (e.key.length == 1) input += e.key.toLowerCase();
        else return;

        const [hiragana, katakana] = stats[answer];
        const correct = input.endsWith(answer);

        if (correct) {
          input = "";
          newQuestion();
        } else if (input.length >= 8) {
          alert(`Hiragana: ${hiragana}\nKatakana: ${katakana}\nRomaji: ‘${answer}’`);
          input = "";
        }
      });

      const freqShift = 100;

      function newQuestion() {
        const target = Math.random() * totalFreq;
        var acc = 0;
        for (let romaji in stats) {
          const [hiragana, katakana, freq] = stats[romaji];
          acc += freq + freqShift;
          if (acc >= target) {
            update(answer = romaji);
            break;
          }
        }
      }

      function update(romaji) {
        const [hiragana, katakana, freq] = stats[romaji];
        const color = colors[romaji.slice(0, 1)] || defaultColor;
        console.log(mode)
        if (mode == "hiragana") {
          questionEl.textContent = hiragana;
          document.body.style.background = color;
          questionEl.style.color = null;
        } else if (mode == "katakana") {
          questionEl.textContent = katakana;
          document.body.style.background = null;
          questionEl.style.color = color;
        }
      }

      function getVoice() {
        const japaneseVoices = window.speechSynthesis
          .getVoices()
          .filter((voice) => voice.lang == "ja-JP");
        return japaneseVoices[
          Math.floor(Math.random() * japaneseVoices.length)
        ];
      }

      function speak(text) {
        var msg = new SpeechSynthesisUtterance();
        msg.voice = getVoice();
        msg.volume = 0.8;
        msg.rate = 0.7;
        msg.text = text;
        speechSynthesis.speak(msg);
      }
    </script>
  </body>
</html>
