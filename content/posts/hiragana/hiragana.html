  <body>
    <div id="question">あ</div>
    <style>
      body {
        display: flex;
        margin: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        font-size: 25vh;
        background: oklch(40% 15% 200deg);
        color: #fee;
        text-shadow: 0 3px 5px #0004;
      }
    </style>
    <script>
    const colors = {
      k: 'oklch(40% 15% 80deg)',
      g: 'oklch(40% 15% 80deg)',
      s: 'oklch(40% 15% 220deg)',
      z: 'oklch(40% 15% 220deg)',
      t: 'oklch(40% 15% 300deg)',
      d: 'oklch(40% 15% 300deg)',
      n: 'oklch(40% 15% 160deg)',
      h: 'oklch(40% 15% 80deg)',
      b: 'oklch(40% 15% 80deg)',
      p: 'oklch(40% 15% 80deg)',
      m: 'oklch(40% 15% 350deg)',
      y: 'oklch(40% 15% 80deg)',
      r: 'oklch(40% 15% 30deg)',
      w: 'oklch(40% 15% 200deg)',
    }

    var input = '';


      const questionEl = document.getElementById('question');

      document.addEventListener("keydown", e => {
        if (e.code == "Space") {
          speak(questionEl.textContent);
          return;
        }
        if (e.key.length == 1) input += e.key.toLowerCase();
        else return;

        const character = questionEl.textContent;
        const [romaji, freq, percent] = stats[character];
        const correct = input.endsWith(romaji);

        if (correct) {
          input = '';
          newQuestion();
        } else if (input.length >= 8) {
          alert(`${character}, ‘${romaji}’`);
          input = '';
        }
      })

      function newQuestion() {
        const targetPercent = Math.random()*100;
        var acc = 0;
        for (let hiragana in stats) {
          const [romaji, freq, percent] = stats[hiragana];
          acc += percent;
          if (acc >= targetPercent) {
            questionEl.textContent = hiragana;
            const color = colors[romaji.slice(0,1)] || null;
            document.body.style.background = color;
            break;
          }
        }
      }

      function getVoice() {
        const japaneseVoices = window.speechSynthesis.getVoices()
          .filter(voice => voice.lang == "ja-JP");
        return japaneseVoices[Math.floor(Math.random()*japaneseVoices.length)]
      }

      function speak(text) {
        var msg = new SpeechSynthesisUtterance();
        msg.voice = getVoice();
        msg.volume = 0.8; // From 0 to 1
        msg.rate = 0.7; // From 0.1 to 10
        msg.text = text;
        speechSynthesis.speak(msg);
      }
    </script>
  </body>
</html>
